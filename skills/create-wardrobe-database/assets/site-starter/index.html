<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wardrobe Database</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <p class="eyebrow">wardrobe database</p>
        <h1>Wardrobe</h1>
        <p class="intro">A simple view of clothes, capsule pieces, and outfit building blocks.</p>
      </header>

      <section class="summary" aria-label="Wardrobe summary">
        <p><span id="pieceCount">0</span> pieces</p>
        <p><span id="capsuleCount">0</span> capsule</p>
      </section>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Brand</th>
              <th>Capsule</th>
              <th>Type</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
